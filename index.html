<style>

.logo{

.logo-mark{width:20px;height:20px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#071a0f;}
.logo-name{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.logo-name b{color:var(--accent);}

/* Trafic pill */
.traffic-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--bg2);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:6px 11px;backdrop-filter:blur(16px);

.traffic-pill.ok  {border-color:rgba(52,201,122,.25);color:var(--accent);}
.traffic-pill.warn{border-color:rgba(232,151,26,.25);color:var(--warn);}

.t-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ok  .t-dot{background:var(--accent);animation:pulse 2s ease infinite;}
.warn.t-dot{background:var(--warn);}
.bad .t-dot{background:var(--danger);animation:blink 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Compteur */
.counter{
  display:flex;align-items:center;gap:5px;

/* ZONE CARD — centre écran */
.zone-card{
  position:fixed;top:50%;left:50%;

  background:var(--bg2);

.zc-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}

.zc-sub{font-size:11px;color:var(--muted2);margin-top:4px;}

/* FEEDBACK */

/* USER DOT */

/* SIGNAL MARKER */
.s-marker{

<script>
// ══════════════════════════════════════════════════════
//  VACUUM LITE v2
//  CartoDB · Firebase · OSM Parkings · TomTom Trafic
// ══════════════════════════════════════════════════════

// ─────────────────────────────────────────────
//  CLÉS — même valeurs que dans le module ES
// ─────────────────────────────────────────────
const GEOAPIFY_KEY = "b84171bcbfcb43a0839baac01ff6d0ce";

const API_BASE = 'https://vacuum-63afge048-anthropotech-lab.vercel.app';

const CFG = {
  GRID:.002, DECAY_S:15, MAX_AGE:300_000,
  COLD_N:5, PRIOR:.25,
  TRAFFIC_INTERVAL: 90_000,
  PARKING_INTERVAL: 120_000,
  PARKING_RADIUS:   800, // mètres
};

const state = {
  lat:48.8566, lng:2.3522,
  signals:[], map:null,
  hexLayers:new Map(), signalMarkers:[],
  parkingMarkers:[], trafficLayer:null,
  userId: localStorage.getItem('vac_uid') || (()=>{
    const uid='u_'+Math.random().toString(36).slice(2,9);
    localStorage.setItem('vac_uid',uid);return uid;
  })(),
  firebaseOk:false, unsubscribe:null,
  address:'',
};

// ── GRID ──────────────────────────────────────
function toH3(lat,lng){const r=Math.floor(lat/CFG.GRID);return`${r}_${Math.floor((lng/CFG.GRID)-(r%2===0?0:.5))}`;}
function h3Center(h3){const[r,c]=h3.split('_').map(Number),o=r%2===0?0:.5;return{lat:(r+.5)*CFG.GRID,lng:(c+o+.5)*CFG.GRID};}
function h3Poly(h3){const[r,c]=h3.split('_').map(Number),g=CFG.GRID,o=r%2===0?0:.5;const la=r*g,lb=(r+1)*g,lo=(c+o)*g,lp=(c+o+1)*g,m=(la+lb)/2;return[[lb,lo+g*.15],[lb,lp-g*.15],[m+g*.5,lp],[la,lp-g*.15],[la,lo+g*.15],[m+g*.5,lo]];}

// ── SCORING ───────────────────────────────────
function sigmoid(x){return 1/(1+Math.exp(-x));}
function scoreS(s,d){const dt=Math.max(0,(Date.now()-s.t)/1000);return Math.exp(-dt/CFG.DECAY_S)*Math.log1p(d);}
function prob(h3){
  const now=Date.now(),cut=now-CFG.MAX_AGE;
  const a=state.signals.filter(s=>s.h3===h3&&s.t>cut);
  const d30=state.signals.filter(s=>s.h3===h3&&s.t>(now-30000)).length;
  const sum=a.reduce((acc,s)=>acc+scoreS(s,d30),0);
  const w=Math.min(1,a.length/CFG.COLD_N);
  return w*sigmoid(sum)+(1-w)*CFG.PRIOR;
}

// ── COULEURS ──────────────────────────────────
function col(p){
  if(p>=.7)return{f:'#34c97a',s:'#27a864'};
  if(p>=.4)return{f:'#e8971a',s:'#c47a10'};
  return{f:'#d44f4f',s:'#b03030'};
}

// ── FIREBASE ──────────────────────────────────
// Attendre que le module Firebase soit prêt
window.addEventListener('firebase-ready', async(e)=>{
  state.firebaseOk = e.detail.ok;
  if(state.firebaseOk) subscribeToSignals();
  else loadLocalSignals();
});

function subscribeToSignals(){
  const{collection,onSnapshot,query,where,Timestamp}=window._fbModules;
  const db=window._db;
  const cutoff=Timestamp.fromMillis(Date.now()-CFG.MAX_AGE);
  const q=query(collection(db,'signals'),where('ts','>',cutoff));

  // Écoute temps réel — WebSocket Firebase
  state.unsubscribe=onSnapshot(q, snap=>{
    state.signals=snap.docs.map(d=>({
      id:d.id, h3:d.data().h3,
      lat:d.data().lat, lng:d.data().lng,
      t:d.data().ts?.toMillis?.()??Date.now(),
    }));
    renderAll();
    updateZoneCard();
    updateCounter();
    setStatus('');
  },err=>{
    console.warn('Firestore error, fallback local');
    state.firebaseOk=false;
    loadLocalSignals();
  });
}

async function saveSignalFirebase(lat,lng,h3){
  const{collection,addDoc,serverTimestamp}=window._fbModules;
  const db=window._db;
  await addDoc(collection(db,'signals'),{
    h3, lat, lng,
    userId:state.userId,
    ts:serverTimestamp(),
  });
}

function loadLocalSignals(){
  try{
    const raw=localStorage.getItem('vac_s');
    if(raw)state.signals=JSON.parse(raw).filter(s=>Date.now()-s.t<CFG.MAX_AGE);
  }catch{state.signals=[];}
  renderAll();updateZoneCard();updateCounter();
}

function saveLocalSignal(lat,lng,h3){
  state.signals.push({h3,t:Date.now(),lat,lng});
  state.signals=state.signals.filter(s=>Date.now()-s.t<CFG.MAX_AGE);
  try{localStorage.setItem('vac_s',JSON.stringify(state.signals));}catch{}
}

// ── CARTE + TRAFIC ───────────────────────────────
function initHereTiles(){
  // CartoDB Dark — gratuit, sans clé, sans inscription
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {maxZoom:20, attribution:'© OpenStreetMap © CARTO'}
  ).addTo(state.map);
}

async function loadHereTraffic(lat,lng){
  // TomTom via proxy Vercel (clé sécurisée côté serveur)
  try{
    const r=await fetch(`${API_BASE}/api/traffic?lat=${lat}&lng=${lng}`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(d.error)throw new Error();
    updateTrafficUI(d.status, d.delay);
    drawTrafficLayer(lat,lng,d.status);
  }catch{simulateTraffic();}
}

function simulateTraffic(){
  const h=new Date().getHours();
  const rush=(h>=7&&h<=9)||(h>=17&&h<=20);
  const night=h<6||h>22;
  const s=night?'ok':rush?(Math.random()>.4?'bad':'warn'):(Math.random()>.7?'warn':'ok');
  updateTrafficUI(s, s==='bad'?Math.floor(4+Math.random()*7):s==='warn'?Math.floor(1+Math.random()*3):0);
  drawTrafficLayer(state.lat,state.lng,s);
}

function updateTrafficUI(status,delay){
  const pill=document.getElementById('traffic-pill');
  pill.style.display='flex';
  pill.className=`traffic-pill ${status}`;
  const dot=document.getElementById('t-dot');
  dot.style.background=status==='ok'?'var(--accent)':status==='warn'?'var(--warn)':'var(--danger)';
  document.getElementById('t-label').textContent=
    status==='ok'?'Fluide':status==='warn'?`+${delay}min`:`Bouchon +${delay}min`;
}

function drawTrafficLayer(lat,lng,status){
  if(state.trafficLayer)state.map.removeLayer(state.trafficLayer);
  const color=status==='ok'?'#34c97a':status==='warn'?'#e8971a':'#d44f4f';
  state.trafficLayer=L.circle([lat,lng],{radius:600,fillColor:color,fillOpacity:.05,color:color,weight:1.5,opacity:.2,dashArray:'5 4'}).addTo(state.map);
}

// ── OSM PARKINGS — international ───────────────
async function loadParkings(lat,lng){
  try{
    // Overpass — parkings publics autour de la position
    const q=`[out:json][timeout:10];(node[amenity=parking](around:${CFG.PARKING_RADIUS},${lat},${lng});way[amenity=parking](around:${CFG.PARKING_RADIUS},${lat},${lng}););out center 15;`;
    const r=await fetch('https://overpass-api.de/api/interpreter',{
      method:'POST',body:'data='+encodeURIComponent(q),
      signal:AbortSignal.timeout(10000),
    });
    if(!r.ok)throw new Error();
    const d=await r.json();
    const pks=d.elements??[];
    if(!pks.length){hideParkCard();return;}

    // Nettoyer anciens marqueurs
    state.parkingMarkers.forEach(m=>state.map.removeLayer(m));
    state.parkingMarkers=[];

    const list=[];
    pks.slice(0,8).forEach(pk=>{
      const t=pk.tags??{};
      const plat=pk.lat??pk.center?.lat;
      const plng=pk.lon??pk.center?.lon;
      if(!plat||!plng)return;

      // Capacité et places libres (si dispo)
      const cap=parseInt(t.capacity||'0');
      const free=parseInt(t['capacity:free']||t['parking:fee']||'0');
      const name=t.name||t['addr:street']||'Parking';
      const fee=t.fee==='no'?'Gratuit':t.fee==='yes'?'Payant':'';
      const access=t.access||'public';
      if(access==='private')return;

      // Statut couleur
      let cls='open',spots='';
      if(cap>0){
        const ratio=free/cap;
        cls=ratio>.3?'open':ratio>.1?'few':'full';
        spots=free>0?free+'pl':'Complet';
      }else{
        cls='open';spots=fee||'P';
      }

      list.push({name,spots,cls,lat:plat,lng:plng,cap,fee,access});

      // Marqueur carte
      const icon=L.divIcon({
        html:`<div class="p-marker ${cls}">${spots||'P'}</div>`,
        iconSize:[52,20],iconAnchor:[26,10],className:'',
      });
      const m=L.marker([plat,plng],{icon}).addTo(state.map);
      m.bindPopup(`<b>${name}</b>${cap?'<br>Capacité : '+cap+' places':''}<br>${fee||'Accès public'}${t.opening_hours?'<br>'+t.opening_hours:''}`);
      state.parkingMarkers.push(m);
    });

    showParkCard(list.slice(0,4));
  }catch(e){
    hideParkCard();
  }
}

function showParkCard(list){
  const card=document.getElementById('park-card');
  card.classList.remove('hidden');
  document.getElementById('park-list').innerHTML=list.map(p=>`
    <div class="pk-item">
      <span class="pk-name">${p.name}</span>
      <span class="pk-spots ${p.cls}">${p.spots||'P'}</span>
    </div>`).join('');
}
function hideParkCard(){document.getElementById('park-card').classList.add('hidden');}

// ── GEOAPIFY — reverse geocoding ───────────────
async function reverseGeo(lat,lng){
  if(!GEOAPIFY_KEY)return;
  try{
    const url=`https://api.geoapify.com/v1/geocode/reverse?lat=${lat}&lon=${lng}&apiKey=${GEOAPIFY_KEY}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    const addr=d.features?.[0]?.properties;
    if(addr){
      const street=addr.street||addr.road||'';
      const city=addr.city||addr.town||'';
      state.address=street?`${street}${city?', '+city:''}`:(city||'');
      if(state.address)setStatus(state.address);
    }
  }catch{}
}

// ── CARTE HEX ─────────────────────────────────
function renderZone(h3){
  const p=prob(h3),pts=h3Poly(h3),{f,s}=col(p),op=.14+p*.45;
  if(state.hexLayers.has(h3)){
    const ly=state.hexLayers.get(h3);
    ly.setLatLngs(pts);
    ly.setStyle({fillColor:f,color:s,fillOpacity:op});
    ly._prob=p;
  }else{
    const poly=L.polygon(pts,{fillColor:f,color:s,weight:1,fillOpacity:op});
    poly._prob=p;poly._h3=h3;
    poly.on('click',function(){
      const ctr=h3Center(this._h3);
      const n=state.signals.filter(s=>s.h3===this._h3&&Date.now()-s.t<CFG.MAX_AGE).length;
      L.popup().setLatLng([ctr.lat,ctr.lng])
        .setContent(`<b>${Math.round(this._prob*100)}%</b> de disponibilité<br>${n} signal${n>1?'s':''} actif${n>1?'s':''}`)
        .openOn(state.map);
    });
    poly.addTo(state.map);
    state.hexLayers.set(h3,poly);
  }
}

function renderAll(){
  const now=Date.now();
  const active=new Set(state.signals.filter(s=>now-s.t<CFG.MAX_AGE).map(s=>s.h3));
  for(const[h3,ly]of state.hexLayers){
    if(!active.has(h3)){state.map.removeLayer(ly);state.hexLayers.delete(h3);}
  }
  for(const h3 of active)renderZone(h3);
}

// ── ZONE CARD ─────────────────────────────────
function updateZoneCard(){
  const h3=toH3(state.lat,state.lng);
  const p=prob(h3),pct=Math.round(p*100);
  const card=document.getElementById('zone-card');
  const el=document.getElementById('zc-prob');
  card.classList.remove('hidden');
  el.textContent=pct+'%';
  el.style.color=pct>=70?'var(--accent)':pct>=40?'var(--warn)':'var(--danger)';
  document.getElementById('zc-sub').textContent=
    pct>=70?'Bonne chance':'de disponibilité';
}

function updateCounter(){
  const n=state.signals.filter(s=>Date.now()-s.t<CFG.MAX_AGE).length;
  document.getElementById('ctr').textContent=n;
}

// ── POINT BLEU ────────────────────────────────
let uMark=null;
function updateMark(lat,lng){
  state.lat=lat;state.lng=lng;
  const icon=L.divIcon({html:`<div class="u-dot"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
  if(uMark)uMark.setLatLng([lat,lng]);
  else uMark=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(state.map);
}

// ── LAYOUT ────────────────────────────────────
function updateLayout(){
  const fabH=90+parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-b')||'0');
  document.getElementById('park-card').style.bottom=(fabH+8)+'px';
  document.getElementById('btn-locate').style.bottom=(fabH+8)+'px';
}

// ── REPORT ────────────────────────────────────
async function report(){
  const fab=document.getElementById('fab');
  if(fab.disabled)return;
  fab.disabled=true;
  setStatus('Localisation…');

  let lat=state.lat,lng=state.lng;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true}));
    lat=pos.coords.latitude;lng=pos.coords.longitude;
  }catch{}

  const h3=toH3(lat,lng);

  // Sauvegarder — Firebase si dispo, sinon local
  if(state.firebaseOk){
    try{await saveSignalFirebase(lat,lng,h3);}
    catch{saveLocalSignal(lat,lng,h3);}
  }else{
    saveLocalSignal(lat,lng,h3);
    // Mettre à jour localement tout de suite
    renderAll();updateZoneCard();updateCounter();
  }

  updateMark(lat,lng);
  state.map.setView([lat,lng],16,{animate:true});

  // Signal marker temporaire
  const icon=L.divIcon({html:`<div class="s-marker"></div>`,iconSize:[10,10],iconAnchor:[5,5],className:''});
  const sm=L.marker([lat,lng],{icon}).addTo(state.map);
  setTimeout(()=>state.map.removeLayer(sm),4000);

  showFeedback();
  reverseGeo(lat,lng);
  setStatus(state.address||'');

  setTimeout(()=>{fab.disabled=false;},1800);
}

function showFeedback(){
  const fb=document.getElementById('feedback');
  fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'),2400);

  const fab=document.getElementById('fab');
  const rect=fab.getBoundingClientRect();
  const burst=document.getElementById('burst');
  burst.style.left=(rect.left+rect.width/2-14)+'px';
  burst.style.top=(rect.top-8)+'px';
  burst.textContent='+3';
  burst.className='burst';
  requestAnimationFrame(()=>requestAnimationFrame(()=>burst.classList.add('fire')));
  setTimeout(()=>burst.className='burst',800);

  if(navigator.vibrate)navigator.vibrate([25,10,25]);
}

function setStatus(msg){
  const el=document.getElementById('status-bar');
  el.textContent=msg;
  el.style.opacity=msg?'1':'0';
}

// ── LOCALISATION ──────────────────────────────
async function locate(){
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true}));
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    updateMark(lat,lng);
    state.map.setView([lat,lng],16,{animate:true});
    updateZoneCard();
    loadParkings(lat,lng);
    loadHereTraffic(lat,lng);
    reverseGeo(lat,lng);
  }catch{setStatus('GPS indisponible');}
}

// ── INIT ──────────────────────────────────────
function init(){
  // Map Leaflet
  state.map=L.map('map',{center:[48.8566,2.3522],zoom:15,zoomControl:false,attributionControl:false});
  initHereTiles();
  updateMark(48.8566,2.3522);
  updateLayout();
  window.addEventListener('resize',updateLayout);

  // Géoloc initiale
  setStatus('Localisation en cours…');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      updateMark(lat,lng);
      state.map.setView([lat,lng],15,{animate:false});
      loadParkings(lat,lng);
      loadHereTraffic(lat,lng);
      reverseGeo(lat,lng);
      setStatus('');
    },()=>{
      setStatus('');
      simulateTraffic();
    },{timeout:6000,enableHighAccuracy:true});

    // Watch continu — point bleu dynamique
    navigator.geolocation.watchPosition(pos=>{
      updateMark(pos.coords.latitude,pos.coords.longitude);
      updateZoneCard();
    },()=>{},{enableHighAccuracy:true,maximumAge:3000});
  }else{
    setStatus('');simulateTraffic();
  }

  // Rafraîchir
  setInterval(()=>{renderAll();updateZoneCard();updateCounter();},5000);
  setInterval(()=>loadHereTraffic(state.lat,state.lng),CFG.TRAFFIC_INTERVAL);
  setInterval(()=>loadParkings(state.lat,state.lng),CFG.PARKING_INTERVAL);
}

// Attendre DOM + Firebase
window.addEventListener('firebase-ready',()=>{});
document.addEventListener('DOMContentLoaded', init);
</script>
