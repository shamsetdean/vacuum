<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vacuum</title>

<!-- Leaflet pour la carte -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ─────────────────────────────────────────────
//  CONFIGURATION — remplace par tes vraies clés
// ─────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBpE7O7m_D7feXOj-TpgsZ6H8wIALpi-W4",
  authDomain:        "vacuum-ffb0f.firebaseapp.com",
  projectId:         "vacuum-ffb0f",
  storageBucket:     "vacuum-ffb0f.firebasestorage.app",
  messagingSenderId: "214784696691",
  appId:             "1:214784696691:web:7532e123c17a1fc501a506",
};

const GEOAPIFY_KEY= "b84171bcbfcb43a0839baac01ff6d0ce";

// ─────────────────────────────────────────────
//  INIT FIREBASE
// ─────────────────────────────────────────────
let db = null;
let firebaseOk = false;

try {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(app);
  firebaseOk = true;
  window._db = db;
  window._fbModules = { collection, addDoc, onSnapshot, query, where, serverTimestamp, Timestamp };
  console.log('Firebase OK');
} catch(e) {
  console.warn('Firebase non configuré — mode localStorage');
}

// Signal à l'app que Firebase est prêt
window.dispatchEvent(new CustomEvent('firebase-ready', { detail: { ok: firebaseOk } }));
</script>

<style>
:root{
  /* Mode clair */
  --bg:        #f0f4f8;
  --glass:     rgba(255,255,255,.72);
  --glass2:    rgba(255,255,255,.55);
  --glass-b:   rgba(255,255,255,.9);
  --border:    rgba(255,255,255,.8);
  --shadow:    0 8px 32px rgba(100,120,160,.18);
  --shadow-sm: 0 4px 16px rgba(100,120,160,.12);
  --text:      #1a2540;
  --text2:     #4a5a78;
  --muted:     #8a9ab8;
  --accent:    #22c55e;
  --a2:        #16a34a;
  --warn:      #f59e0b;
  --danger:    #ef4444;
  --blue:      #3b82f6;
  --r:         22px;
  --r2:        16px;
  --blur:      blur(20px);
  -webkit-blur: blur(20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;min-height:100vh;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,'SF Pro Display','DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

/* MAP — carte claire */
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;filter:brightness(1.05) saturate(.9);}

/* ── TOP BAR ── */
.top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:max(16px,env(safe-area-inset-top)) 16px 12px;
  pointer-events:none;gap:8px;
}
.top>*{pointer-events:all;}

.logo{
  display:flex;align-items:center;gap:8px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:8px 14px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
}
.logo-mark{
  width:24px;height:24px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:white;
}
.logo-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.logo-name b{color:var(--accent);}

.traffic-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:8px 13px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  font-size:12px;font-weight:600;transition:all .3s;
}
.traffic-pill.ok  {color:var(--accent);}
.traffic-pill.warn{color:var(--warn);}
.traffic-pill.bad {color:var(--danger);}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.traffic-pill.ok   .t-dot{background:var(--accent);animation:pulse 2s ease infinite;}
.traffic-pill.warn .t-dot{background:var(--warn);}
.traffic-pill.bad  .t-dot{background:var(--danger);animation:blink 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.counter{
  display:flex;align-items:center;gap:6px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:8px 13px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  font-size:12px;font-weight:600;color:var(--text2);
}
.counter-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite;}
.counter b{color:var(--text);}

/* ── ZONE CARD ── */
.zone-card{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:15;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 28px;
  text-align:center;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow);
  min-width:160px;
  transition:opacity .3s,transform .3s;
  pointer-events:none;
}
.zone-card.hidden{opacity:0;transform:translate(-50%,-50%) scale(.95);}
.zc-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.zc-prob{font-size:46px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;transition:color .4s;}
.zc-sub{font-size:12px;color:var(--text2);margin-top:5px;font-weight:500;}

/* ── PARKINGS CARD ── */
.park-card{
  position:fixed;right:14px;z-index:15;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r2);padding:12px 14px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow);
  min-width:140px;max-width:170px;
  transition:bottom .35s cubic-bezier(.4,0,.2,1),opacity .3s;
}
.park-card.hidden{opacity:0;pointer-events:none;}
.pc-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.pk-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.pk-item:last-child{border-bottom:none;}
.pk-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.pk-spots{font-size:11px;font-weight:700;font-family:'SF Mono',monospace;}
.pk-spots.open{color:var(--accent);}
.pk-spots.few{color:var(--warn);}
.pk-spots.full{color:var(--danger);}

/* ── BTN LOCATE ── */
.btn-locate{
  position:fixed;right:14px;z-index:15;
  width:46px;height:46px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  color:var(--blue);
  transition:bottom .35s cubic-bezier(.4,0,.2,1),transform .15s;
}
.btn-locate:active{transform:scale(.92);}

/* ── FAB ── */
.fab-wrap{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 28px);
  left:0;right:0;
  display:flex;justify-content:center;
  z-index:25;padding:0 28px;
}
.fab{
  width:100%;max-width:320px;height:66px;
  background:var(--accent);
  color:white;
  font-size:17px;font-weight:700;letter-spacing:-.2px;
  border:none;border-radius:var(--r);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:11px;
  box-shadow:0 8px 32px rgba(34,197,94,.4),0 2px 8px rgba(0,0,0,.1);
  transition:transform .12s,background .15s,box-shadow .2s;
  -webkit-user-select:none;user-select:none;
}
.fab:active{transform:scale(.96);background:var(--a2);}
.fab:disabled{background:rgba(34,197,94,.4);color:rgba(255,255,255,.6);box-shadow:none;}
.fab svg{width:24px;height:24px;flex-shrink:0;}

/* ── FEEDBACK ── */
.feedback{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 110px);
  left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--glass-b);border:1px solid rgba(34,197,94,.3);
  border-radius:12px;padding:10px 20px;
  font-size:13px;font-weight:600;color:var(--accent);
  z-index:30;opacity:0;pointer-events:none;white-space:nowrap;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  transition:opacity .2s,transform .2s;
}
.feedback.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── BURST ── */
.burst{
  position:fixed;z-index:50;pointer-events:none;
  font-size:22px;font-weight:800;color:var(--accent);
  text-shadow:0 2px 12px rgba(34,197,94,.4);
  opacity:0;
}
.burst.fire{animation:burstUp .75s ease forwards;}
@keyframes burstUp{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-44px) scale(1.2);}
  100%{opacity:0;transform:translateY(-70px) scale(.9);}
}

/* ── USER DOT ── */
.u-dot{
  width:18px;height:18px;background:var(--blue);
  border:3px solid white;border-radius:50%;
  box-shadow:0 0 0 5px rgba(59,130,246,.25),0 2px 8px rgba(0,0,0,.2);
}

/* ── PARKING MARKER ── */
.p-marker{
  background:var(--glass-b);border:1.5px solid rgba(59,130,246,.4);
  border-radius:8px;padding:3px 8px;
  font-size:10px;font-weight:700;
  font-family:'SF Mono',monospace;
  color:var(--blue);white-space:nowrap;
  box-shadow:var(--shadow-sm);
  backdrop-filter:blur(8px);
}
.p-marker.open{border-color:rgba(34,197,94,.5);color:var(--accent);}
.p-marker.few {border-color:rgba(245,158,11,.5);color:var(--warn);}
.p-marker.full{border-color:rgba(239,68,68,.5);color:var(--danger);}

/* ── SIGNAL MARKER ── */
.s-marker{
  width:12px;height:12px;
  background:var(--accent);border:2.5px solid white;
  border-radius:50%;
  box-shadow:0 0 10px rgba(34,197,94,.5),0 2px 4px rgba(0,0,0,.15);
  animation:signalPop .4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes signalPop{
  0%{transform:scale(0);}
  70%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* ── STATUS BAR ── */
.status-bar{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 104px);
  left:50%;transform:translateX(-50%);
  z-index:20;
  font-size:11px;font-weight:500;color:var(--text2);
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:5px 14px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  pointer-events:none;transition:opacity .3s;
}

/* Leaflet */
.leaflet-popup-content-wrapper{
  background:rgba(255,255,255,.92)!important;
  border:1px solid rgba(255,255,255,.8)!important;
  border-radius:var(--r2)!important;
  color:var(--text)!important;
  font-family:-apple-system,sans-serif!important;
  box-shadow:var(--shadow)!important;
  backdrop-filter:blur(12px)!important;
}
.leaflet-popup-tip{background:rgba(255,255,255,.92)!important;}
.leaflet-popup-content{margin:11px 14px!important;font-size:13px!important;line-height:1.5!important;}
.leaflet-control-zoom{display:none!important;}
.leaflet-control-attribution{
  background:rgba(255,255,255,.6)!important;
  backdrop-filter:blur(8px)!important;
  border-radius:8px 0 0 0!important;
  font-size:9px!important;
}

/* ── ZONE PILL — sous logo, non invasive ── */
.zone-pill{
  position:fixed;left:50%;transform:translateX(-50%);
  top:calc(max(16px,env(safe-area-inset-top)) + 54px);
  z-index:15;
  display:flex;align-items:center;gap:8px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:7px 16px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  pointer-events:none;
  transition:opacity .3s;white-space:nowrap;
}
.zone-pill.hidden{opacity:0;}
.zp-prob{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}
.zp-label{font-size:12px;color:var(--text2);font-weight:500;}

/* ── INFO BAR — adresse + trafic en bas ── */
.info-bar{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 104px);
  left:50%;transform:translateX(-50%);
  z-index:20;
  display:flex;align-items:center;gap:7px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
  pointer-events:none;transition:opacity .3s;white-space:nowrap;
  max-width:calc(100vw - 32px);overflow:hidden;
}
.ib-traffic{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;flex-shrink:0;}
.ib-traffic.ok  {color:var(--accent);}
.ib-traffic.warn{color:var(--warn);}
.ib-traffic.bad {color:var(--danger);}
.ibt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ib-sep{font-size:11px;color:var(--muted);flex-shrink:0;}
.ib-addr{font-size:11px;color:var(--text2);font-weight:500;overflow:hidden;text-overflow:ellipsis;}

/* ── TRAFFIC LAYER sur la carte ── */
/* Géré via Leaflet polylines colorées */

/* Supprimer anciens styles inutiles */
.zone-card,.status-bar,.traffic-pill{display:none!important;}

/* ── VÉLO MARKER ── */
.v-marker{
  background:var(--glass-b);border:1.5px solid rgba(139,92,246,.5);
  border-radius:7px;padding:2px 7px;
  font-size:10px;font-weight:700;
  font-family:'SF Mono',monospace;
  color:#7c3aed;white-space:nowrap;
  box-shadow:var(--shadow-sm);
  backdrop-filter:blur(8px);
}
.v-marker.dispo{border-color:rgba(34,197,94,.5);color:var(--accent);}
.v-marker.vide {border-color:rgba(239,68,68,.4);color:var(--danger);}

/* ── WC MARKER ── */
.wc-marker{
  background:var(--glass-b);border:1.5px solid rgba(59,130,246,.4);
  border-radius:7px;padding:2px 7px;
  font-size:10px;font-weight:700;
  color:var(--blue);white-space:nowrap;
  box-shadow:var(--shadow-sm);
  backdrop-filter:blur(8px);
}
.wc-marker.free{border-color:rgba(34,197,94,.5);color:var(--accent);}
.wc-marker.paid{border-color:rgba(245,158,11,.4);color:var(--warn);}

/* ── FILTER PANEL ── */
.filter-btn{
  position:fixed;left:14px;z-index:15;
  width:46px;height:46px;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);color:var(--text2);
  transition:bottom .35s cubic-bezier(.4,0,.2,1),background .15s;
}
.filter-btn:active{transform:scale(.92);}
.filter-btn.has-active{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.35);color:var(--blue);}

.filter-panel{
  position:fixed;left:14px;z-index:16;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow);
  min-width:180px;
  transition:bottom .35s cubic-bezier(.4,0,.2,1),opacity .2s,transform .2s;
  opacity:0;pointer-events:none;transform:translateY(10px);
}
.filter-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}

.fp-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}

.fp-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);
  cursor:pointer;gap:10px;
}
.fp-item:last-child{border-bottom:none;}
.fp-left{display:flex;align-items:center;gap:8px;}
.fp-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.fp-label{font-size:12px;font-weight:500;color:var(--text);}
.fp-sub{font-size:9px;color:var(--muted);}

/* Toggle switch */
.toggle{
  width:36px;height:20px;border-radius:10px;
  background:#dde1e8;flex-shrink:0;
  position:relative;transition:background .2s;cursor:pointer;
}
.toggle.on{background:var(--accent);}
.toggle::after{
  content:'';position:absolute;
  width:16px;height:16px;border-radius:50%;
  background:white;top:2px;left:2px;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  transition:transform .2s cubic-bezier(.4,0,.2,1);
}
.toggle.on::after{transform:translateX(16px);}

/* ── DESKTOP ── */
@media (min-width: 768px) {
  .fab-wrap { max-width: 600px; left: 50%; right: auto; transform: translateX(-50%); }
  .info-bar  { max-width: 500px; }
  .zone-pill { max-width: 300px; }
  .filter-panel { max-width: 220px; }
  .top { max-width: 100%; }
}
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div class="top">
  <div class="logo">
    <div class="logo-mark">V</div>
    <span class="logo-name">VAC<b>UUM</b></span>
  </div>

  <div class="counter">
    <div class="counter-dot"></div>
    <b id="ctr">0</b>&nbsp;live
  </div>
</div>

<!-- ZONE PILL — discrète sous le top bar -->
<div class="zone-pill hidden" id="zone-card">
  <div class="zp-prob" id="zc-prob">—</div>
  <div class="zp-label" id="zc-sub">de disponibilité</div>
</div>

<!-- PARKINGS — marqueurs uniquement sur la carte -->
<div id="park-card" style="display:none;"></div>

<!-- LOCATE -->
<button class="btn-locate" id="btn-locate" onclick="locate()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
</button>


<!-- FILTER BUTTON -->
<button class="filter-btn" id="filter-btn" onclick="toggleFilterPanel()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="4" y1="6" x2="20" y2="6"/>
    <line x1="8" y1="12" x2="16" y2="12"/>
    <line x1="11" y1="18" x2="13" y2="18"/>
  </svg>
</button>

<!-- FILTER PANEL -->
<div class="filter-panel" id="filter-panel">
  <div class="fp-title">Afficher sur la carte</div>

  <div class="fp-item" onclick="toggleLayer('wc')">
    <div class="fp-left">
      <div class="fp-icon" style="background:rgba(59,130,246,.1);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"><path d="M5 3h14M5 21h14M8 3v18M16 3v18M3 8h2M3 16h2M19 8h2M19 16h2"/></svg>
      </div>
      <div><div class="fp-label">Toilettes</div><div class="fp-sub">WC publics</div></div>
    </div>
    <div class="toggle on" id="toggle-wc"></div>
  </div>

  <div class="fp-item" onclick="toggleLayer('water')">
    <div class="fp-left">
      <div class="fp-icon" style="background:rgba(14,165,233,.1);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"><path d="M12 2C6 8 4 12 4 15a8 8 0 0 0 16 0c0-3-2-7-8-13z"/></svg>
      </div>
      <div><div class="fp-label">Eau potable</div><div class="fp-sub">Fontaines</div></div>
    </div>
    <div class="toggle on" id="toggle-water"></div>
  </div>

  <div class="fp-item" onclick="toggleLayer('bench')">
    <div class="fp-left">

<script>
// ══════════════════════════════════════════════════════
//  VACUUM LITE v2
//  CartoDB · Firebase · OSM Parkings · TomTom Trafic
// ══════════════════════════════════════════════════════

// ─────────────────────────────────────────────
//  CLÉS — même valeurs que dans le module ES
// ─────────────────────────────────────────────
const GEOAPIFY_KEY = "b84171bcbfcb43a0839baac01ff6d0ce";

const API_BASE = 'https://vacuum-63afge048-anthropotech-lab.vercel.app';

const CFG = {
  GRID:.002, DECAY_S:15, MAX_AGE:300_000,
  COLD_N:5, PRIOR:.25,
  TRAFFIC_INTERVAL: 90_000,
  PARKING_INTERVAL: 120_000,
  PARKING_RADIUS:   800, // mètres
};

const state = {
  lat:48.8566, lng:2.3522,
  signals:[], map:null,
  hexLayers:new Map(), signalMarkers:[],
  parkingMarkers:[], veloMarkers:[], trafficLayer:null,
  userId: localStorage.getItem('vac_uid') || (()=>{
    const uid='u_'+Math.random().toString(36).slice(2,9);
    localStorage.setItem('vac_uid',uid);return uid;
  })(),
  firebaseOk:false, unsubscribe:null,
  address:'',
};

// ── GRID ──────────────────────────────────────
function toH3(lat,lng){const r=Math.floor(lat/CFG.GRID);return`${r}_${Math.floor((lng/CFG.GRID)-(r%2===0?0:.5))}`;}
function h3Center(h3){const[r,c]=h3.split('_').map(Number),o=r%2===0?0:.5;return{lat:(r+.5)*CFG.GRID,lng:(c+o+.5)*CFG.GRID};}
function h3Poly(h3){const[r,c]=h3.split('_').map(Number),g=CFG.GRID,o=r%2===0?0:.5;const la=r*g,lb=(r+1)*g,lo=(c+o)*g,lp=(c+o+1)*g,m=(la+lb)/2;return[[lb,lo+g*.15],[lb,lp-g*.15],[m+g*.5,lp],[la,lp-g*.15],[la,lo+g*.15],[m+g*.5,lo]];}

// ── SCORING ───────────────────────────────────
function sigmoid(x){return 1/(1+Math.exp(-x));}
function scoreS(s,d){const dt=Math.max(0,(Date.now()-s.t)/1000);return Math.exp(-dt/CFG.DECAY_S)*Math.log1p(d);}
function prob(h3){
  const now=Date.now(),cut=now-CFG.MAX_AGE;
  const a=state.signals.filter(s=>s.h3===h3&&s.t>cut);
  const d30=state.signals.filter(s=>s.h3===h3&&s.t>(now-30000)).length;
  const sum=a.reduce((acc,s)=>acc+scoreS(s,d30),0);
  const w=Math.min(1,a.length/CFG.COLD_N);
  return w*sigmoid(sum)+(1-w)*CFG.PRIOR;
}

// ── COULEURS ──────────────────────────────────
function col(p){
  if(p>=.7)return{f:'#34c97a',s:'#27a864'};
  if(p>=.4)return{f:'#e8971a',s:'#c47a10'};
  return{f:'#d44f4f',s:'#b03030'};
}

// ── FIREBASE ──────────────────────────────────
// Attendre que le module Firebase soit prêt
window.addEventListener('firebase-ready', async(e)=>{
  state.firebaseOk = e.detail.ok;
  if(state.firebaseOk) subscribeToSignals();
  else loadLocalSignals();
});

function subscribeToSignals(){
  const{collection,onSnapshot,query,where,Timestamp}=window._fbModules;
  const db=window._db;
  const cutoff=Timestamp.fromMillis(Date.now()-CFG.MAX_AGE);
  const q=query(collection(db,'signals'),where('ts','>',cutoff));

  // Écoute temps réel — WebSocket Firebase
  state.unsubscribe=onSnapshot(q, snap=>{
    state.signals=snap.docs.map(d=>({
      id:d.id, h3:d.data().h3,
      lat:d.data().lat, lng:d.data().lng,
      t:d.data().ts?.toMillis?.()??Date.now(),
    }));
    renderAll();
    updateZoneCard();
    updateCounter();
    setStatus('');
  },err=>{
    console.warn('Firestore error, fallback local');
    state.firebaseOk=false;
    loadLocalSignals();
  });
}

async function saveSignalFirebase(lat,lng,h3){
  const{collection,addDoc,serverTimestamp}=window._fbModules;
  const db=window._db;
  await addDoc(collection(db,'signals'),{
    h3, lat, lng,
    userId:state.userId,
    ts:serverTimestamp(),
  });
}

function loadLocalSignals(){
  try{
    const raw=localStorage.getItem('vac_s');
    if(raw)state.signals=JSON.parse(raw).filter(s=>Date.now()-s.t<CFG.MAX_AGE);
  }catch{state.signals=[];}
  renderAll();updateZoneCard();updateCounter();
}

function saveLocalSignal(lat,lng,h3){
  state.signals.push({h3,t:Date.now(),lat,lng});
  state.signals=state.signals.filter(s=>Date.now()-s.t<CFG.MAX_AGE);
  try{localStorage.setItem('vac_s',JSON.stringify(state.signals));}catch{}
}

// ── CARTE + TRAFIC ───────────────────────────────
function initHereTiles(){
  // CartoDB Dark — gratuit, sans clé, sans inscription
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {maxZoom:20, attribution:'© OpenStreetMap contributors © CARTO'}
  ).addTo(state.map);
}

async function loadHereTraffic(lat,lng){
  // TomTom via proxy Vercel (clé sécurisée côté serveur)
  try{
    const r=await fetch(`${API_BASE}/api/traffic?lat=${lat}&lng=${lng}`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(d.error)throw new Error();
    updateTrafficUI(d.status, d.delay);
    drawTrafficLayer(lat,lng,d.status);
  }catch{simulateTraffic();}
}

function simulateTraffic(){
  const h=new Date().getHours();
  const rush=(h>=7&&h<=9)||(h>=17&&h<=20);
  const night=h<6||h>22;
  const s=night?'ok':rush?(Math.random()>.4?'bad':'warn'):(Math.random()>.7?'warn':'ok');
  updateTrafficUI(s, s==='bad'?Math.floor(4+Math.random()*7):s==='warn'?Math.floor(1+Math.random()*3):0);
  drawTrafficLayer(state.lat,state.lng,s);
}

function updateTrafficUI(status,delay){
  // Info bar — trafic + adresse en une ligne
  const tb=document.getElementById('ib-traffic');
  const dot=document.getElementById('ibt-dot');
  const lbl=document.getElementById('ibt-label');
  const sep=document.getElementById('ib-sep');
  if(tb){
    tb.style.display='flex';
    tb.className=`ib-traffic ${status}`;
    dot.style.background=status==='ok'?'var(--accent)':status==='warn'?'var(--warn)':'var(--danger)';
    lbl.textContent=status==='ok'?'Trafic fluide':status==='warn'?`Ralenti +${delay}min`:`Bouchon +${delay}min`;
    if(sep)sep.style.display='block';
  }
}

function drawTrafficLayer(lat,lng,status){
  if(state.trafficLayer)state.map.removeLayer(state.trafficLayer);
  const color=status==='ok'?'#34c97a':status==='warn'?'#e8971a':'#d44f4f';
  state.trafficLayer=L.circle([lat,lng],{radius:600,fillColor:color,fillOpacity:.05,color:color,weight:1.5,opacity:.2,dashArray:'5 4'}).addTo(state.map);
}

// ── OSM PARKINGS — international ───────────────
async function loadParkings(lat,lng){
  try{
    // Overpass — parkings publics autour de la position
    const q=`[out:json][timeout:10];(node[amenity=parking](around:${CFG.PARKING_RADIUS},${lat},${lng});way[amenity=parking](around:${CFG.PARKING_RADIUS},${lat},${lng}););out center 15;`;
    const r=await fetch('https://overpass-api.de/api/interpreter',{
      method:'POST',body:'data='+encodeURIComponent(q),
      signal:AbortSignal.timeout(10000),
    });
    if(!r.ok)throw new Error();
    const d=await r.json();
    const pks=d.elements??[];
    if(!pks.length){hideParkCard();return;}

    // Nettoyer anciens marqueurs
    state.parkingMarkers.forEach(m=>state.map.removeLayer(m));
    state.parkingMarkers=[];

    const list=[];
    pks.slice(0,8).forEach(pk=>{
      const t=pk.tags??{};
      const plat=pk.lat??pk.center?.lat;
      const plng=pk.lon??pk.center?.lon;
      if(!plat||!plng)return;

      // Capacité et places libres (si dispo)
      const cap=parseInt(t.capacity||'0');
      const free=parseInt(t['capacity:free']||t['parking:fee']||'0');
      const name=t.name||t['addr:street']||'Parking';
      const fee=t.fee==='no'?'Gratuit':t.fee==='yes'?'Payant':'';
      const access=t.access||'public';
      if(access==='private')return;

      // Statut couleur
      let cls='open',spots='';
      if(cap>0){
        const ratio=free/cap;
        cls=ratio>.3?'open':ratio>.1?'few':'full';
        spots=free>0?free+'pl':'Complet';
      }else{
        cls='open';spots=fee||'P';
      }

      list.push({name,spots,cls,lat:plat,lng:plng,cap,fee,access});

      // Marqueur carte
      const icon=L.divIcon({
        html:`<div class="p-marker ${cls}">${spots||'P'}</div>`,
        iconSize:[52,20],iconAnchor:[26,10],className:'',
      });
      const m=L.marker([plat,plng],{icon}).addTo(state.map);
      m.bindPopup(`<b>${name}</b>${cap?'<br>Capacité : '+cap+' places':''}<br>${fee||'Accès public'}${t.opening_hours?'<br>'+t.opening_hours:''}`);
      state.parkingMarkers.push(m);
    });

    showParkCard(list.slice(0,4));
  }catch(e){
    hideParkCard();
  }
}


// ── LAYER SYSTEM ──────────────────────────────
const layers = {

    if(layers[id].on) state.map.addLayer(m);

}

document.addEventListener('click', e => {

function clearLayer(id){
  (layers[id]?.markers||[]).forEach(m=>state.map.removeLayer(m));

function addLayerMarker(id,lat,lng,html,popup){
  const icon=L.divIcon({html,iconSize:[84,20],iconAnchor:[42,10],className:''});

// ── GEOAPIFY — reverse geocoding ───────────────
async function reverseGeo(lat,lng){
  if(!GEOAPIFY_KEY)return;
  try{
    const url=`https://api.geoapify.com/v1/geocode/reverse?lat=${lat}&lon=${lng}&apiKey=${GEOAPIFY_KEY}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    const addr=d.features?.[0]?.properties;
    if(addr){
      const street=addr.street||addr.road||'';
      const city=addr.city||addr.town||'';
      state.address=street?`${street}${city?', '+city:''}`:(city||'');
      if(state.address)setStatus(state.address);
    }
  }catch{}
}

// ── CARTE HEX ─────────────────────────────────
function renderZone(h3){
  const p=prob(h3),pts=h3Poly(h3),{f,s}=col(p),op=.14+p*.45;
  if(state.hexLayers.has(h3)){
    const ly=state.hexLayers.get(h3);
    ly.setLatLngs(pts);
    ly.setStyle({fillColor:f,color:s,fillOpacity:op});
    ly._prob=p;
  }else{
    const poly=L.polygon(pts,{fillColor:f,color:s,weight:1,fillOpacity:op});
    poly._prob=p;poly._h3=h3;
    poly.on('click',function(){
      const ctr=h3Center(this._h3);
      const n=state.signals.filter(s=>s.h3===this._h3&&Date.now()-s.t<CFG.MAX_AGE).length;
      L.popup().setLatLng([ctr.lat,ctr.lng])
        .setContent(`<b>${Math.round(this._prob*100)}%</b> de disponibilité<br>${n} signal${n>1?'s':''} actif${n>1?'s':''}`)
        .openOn(state.map);
    });
    poly.addTo(state.map);
    state.hexLayers.set(h3,poly);
  }
}

function renderAll(){
  const now=Date.now();
  const active=new Set(state.signals.filter(s=>now-s.t<CFG.MAX_AGE).map(s=>s.h3));
  for(const[h3,ly]of state.hexLayers){
    if(!active.has(h3)){state.map.removeLayer(ly);state.hexLayers.delete(h3);}
  }
  for(const h3 of active)renderZone(h3);
}

// ── ZONE CARD ─────────────────────────────────
function updateZoneCard(){
  const h3=toH3(state.lat,state.lng);
  const p=prob(h3),pct=Math.round(p*100);
  const pill=document.getElementById('zone-card');
  const el=document.getElementById('zc-prob');
  if(pill)pill.classList.remove('hidden');
  if(el){
    el.textContent=pct+'%';
    el.style.color=pct>=70?'var(--accent)':pct>=40?'var(--warn)':'var(--danger)';
  }
  const sub=document.getElementById('zc-sub');
  if(sub)sub.textContent=pct>=70?'disponible':'de disponibilité';
}

function updateCounter(){
  const n=state.signals.filter(s=>Date.now()-s.t<CFG.MAX_AGE).length;
  document.getElementById('ctr').textContent=n;
}

// ── POINT BLEU ────────────────────────────────
let uMark=null;
function updateMark(lat,lng){
  state.lat=lat;state.lng=lng;
  const icon=L.divIcon({html:`<div class="u-dot"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
  if(uMark)uMark.setLatLng([lat,lng]);
  else uMark=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(state.map);
}

// ── LAYOUT ────────────────────────────────────
function updateLayout(){
  const safeB = parseInt(
    getComputedStyle(document.documentElement)
      .getPropertyValue('--safe-b').trim()
  ) || 0;
  const base = 28 + safeB;
  const fabH = 66 + base;
  document.getElementById('btn-locate').style.bottom  = (fabH + 8) + 'px';
  document.getElementById('filter-btn').style.bottom  = (fabH + 8) + 'px';
  document.getElementById('filter-panel').style.bottom = (fabH + 62) + 'px';
  const infoEl = document.getElementById('info-bar');
  if(infoEl) infoEl.style.bottom = (fabH - 14) + 'px';
  // Légende zone
  const zp = document.getElementById('zone-card');
  // Toujours positionné par CSS
}

// ── REPORT ────────────────────────────────────
async function report(){
  const fab=document.getElementById('fab');
  if(fab.disabled)return;
  fab.disabled=true;
  setStatus('Localisation…');

  let lat=state.lat,lng=state.lng;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true}));
    lat=pos.coords.latitude;lng=pos.coords.longitude;
  }catch{}

  const h3=toH3(lat,lng);

  // Sauvegarder — Firebase si dispo, sinon local
  if(state.firebaseOk){
    try{await saveSignalFirebase(lat,lng,h3);}
    catch{saveLocalSignal(lat,lng,h3);}
  }else{
    saveLocalSignal(lat,lng,h3);
    // Mettre à jour localement tout de suite
    renderAll();updateZoneCard();updateCounter();
  }

  updateMark(lat,lng);
  state.map.setView([lat,lng],16,{animate:true});

  // Signal marker temporaire
  const icon=L.divIcon({html:`<div class="s-marker"></div>`,iconSize:[10,10],iconAnchor:[5,5],className:''});
  const sm=L.marker([lat,lng],{icon}).addTo(state.map);
  setTimeout(()=>state.map.removeLayer(sm),4000);

  showFeedback();
  reverseGeo(lat,lng);
  setStatus(state.address||'');

  setTimeout(()=>{fab.disabled=false;},1800);
}

function showFeedback(){
  const fb=document.getElementById('feedback');
  fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'),2400);

  const fab=document.getElementById('fab');
  const rect=fab.getBoundingClientRect();
  const burst=document.getElementById('burst');
  burst.style.left=(rect.left+rect.width/2-14)+'px';
  burst.style.top=(rect.top-8)+'px';
  burst.textContent='+3';
  burst.className='burst';
  requestAnimationFrame(()=>requestAnimationFrame(()=>burst.classList.add('fire')));
  setTimeout(()=>burst.className='burst',800);

  if(navigator.vibrate)navigator.vibrate([25,10,25]);
}

function setStatus(msg){
  const el=document.getElementById('status-bar');
  if(el){el.textContent=msg;el.style.opacity=msg?'1':'0';}
}

// ── LOCALISATION ──────────────────────────────
async function locate(){
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true}));
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    updateMark(lat,lng);
    state.map.setView([lat,lng],16,{animate:true});
    updateZoneCard();
    loadParkings(lat,lng);
    loadAllLayers(lat,lng);
    loadHereTraffic(lat,lng);
    reverseGeo(lat,lng);
  }catch{setStatus('GPS indisponible');}
}

// ── INIT ──────────────────────────────────────
function init(){
  // Map Leaflet
  const mapEl = document.getElementById('map');
  mapEl.style.width  = '100%';
  mapEl.style.height = '100vh';
  state.map=L.map('map',{center:[48.8566,2.3522],zoom:15,zoomControl:false,attributionControl:false});
  initHereTiles();
  updateMark(48.8566,2.3522);
  updateLayout();
  window.addEventListener('resize',updateLayout);

  // Géoloc initiale
  setStatus('Localisation en cours…');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      updateMark(lat,lng);
      state.map.setView([lat,lng],15,{animate:false});
      loadParkings(lat,lng);
    loadAllLayers(lat,lng);
    loadHereTraffic(lat,lng);
      reverseGeo(lat,lng);
      setStatus('');
    },()=>{
      setStatus('');
      simulateTraffic();
    },{timeout:6000,enableHighAccuracy:true});

    // Watch continu — point bleu dynamique
    navigator.geolocation.watchPosition(pos=>{
      updateMark(pos.coords.latitude,pos.coords.longitude);
      updateZoneCard();
    },()=>{},{enableHighAccuracy:true,maximumAge:3000});
  }else{
    setStatus('');simulateTraffic();
  }

  // Rafraîchir
  setInterval(()=>{renderAll();updateZoneCard();updateCounter();},5000);
  setInterval(()=>loadHereTraffic(state.lat,state.lng),CFG.TRAFFIC_INTERVAL);
  setInterval(()=>loadParkings(state.lat,state.lng),CFG.PARKING_INTERVAL);
  setInterval(()=>loadAllLayers(state.lat,state.lng),CFG.PARKING_INTERVAL);
}

// Attendre DOM + Firebase
window.addEventListener('firebase-ready',()=>{});
document.addEventListener('DOMContentLoaded', init);
</script>
