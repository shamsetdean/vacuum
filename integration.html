<!--
═══════════════════════════════════════════════════════════════════════
  VACUUM — INTÉGRATION FAVICON & OPEN GRAPH
═══════════════════════════════════════════════════════════════════════
  À coller dans le <head> de vacuum.html, juste après <title>...</title>.
  Tous les fichiers doivent être servis depuis la racine du domaine.
  Si tu déploies dans un sous-dossier, ajuste les chemins en conséquence.

  Remplace https://vacuum.example.com par l'URL réelle de ton déploiement
  (Vercel/Netlify/etc.) — utilisée par Open Graph et Twitter Cards.
═══════════════════════════════════════════════════════════════════════
-->

<!-- ─── FAVICONS ─────────────────────────────────────────────────── -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">

<!-- ─── PWA / NAVIGATEUR MOBILE ──────────────────────────────────── -->
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-title" content="Vacuum">
<meta name="application-name" content="Vacuum">

<!-- ─── OPEN GRAPH (Facebook, LinkedIn, WhatsApp, Discord, etc.) ── -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Vacuum">
<meta property="og:title" content="Vacuum — Trouvez une place libre, à plusieurs">
<meta property="og:description" content="Application bénévole et gratuite pour repérer ensemble les places de stationnement libres en ville. Aucune publicité, aucune donnée bancaire collectée.">
<meta property="og:url" content="https://vacuum.example.com/">
<meta property="og:image" content="https://vacuum.example.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
<meta property="og:image:alt" content="Logo Vacuum : un cercle minimaliste avec le mot VACUUM au centre">
<meta property="og:locale" content="fr_FR">

<!-- ─── TWITTER CARDS ────────────────────────────────────────────── -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Vacuum — Trouvez une place libre, à plusieurs">
<meta name="twitter:description" content="Application bénévole et gratuite pour repérer ensemble les places de stationnement libres en ville.">
<meta name="twitter:image" content="https://vacuum.example.com/og-image.png">
<meta name="twitter:image:alt" content="Logo Vacuum">

<!-- ─── SEO MINIMAL ──────────────────────────────────────────────── -->
<meta name="description" content="Application bénévole et gratuite pour repérer ensemble les places de stationnement libres en ville. Aucune publicité, aucune donnée bancaire collectée.">
<meta name="author" content="Vacuum">
<link rel="canonical" href="https://vacuum.example.com/">
